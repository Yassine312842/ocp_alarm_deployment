# Production storage path. Not needed for local dev (DuckDB is embedded).
# `docker compose up -d` then apply src/storage/schema.sql.
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ocp
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: alarms
    ports:
      - "5432:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - timescaledb

volumes:
  tsdata:
