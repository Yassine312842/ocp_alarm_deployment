<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OCP · Alarm Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Light theme. Surfaces go from page (--bg) up through raised panels;
       priority hues are kept saturated but paired with soft tinted backgrounds
       so severity still reads at a glance on white. */
    --bg:#F4F6F9; --panel:#FFFFFF; --panel-2:#F7F9FC; --panel-3:#EEF2F7;
    --line:#DDE4EC; --line-2:#C3CEDB;
    --text:#1A2430; --muted:#5E6B7A; --dim:#93A0AF;
    --critical:#D8382F; --critical-bg:#FBE9E7;
    --high:#C77A16;    --high-bg:#FBF0DC;
    --medium:#A8901A;  --medium-bg:#F7F1D6;
    --low:#6B7A8C;     --low-bg:#EDF1F5;
    --ok:#0E9E86; --accent:#0E9E86;
    --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased}
  #root{height:100%}
  ::selection{background:rgba(55,201,182,.28)}
  a{color:inherit}
  button{font-family:inherit}
  .app{display:grid;grid-template-columns:216px 1fr;height:100vh}

  /* ---- rail ---- */
  .rail{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 0}
  .brand{display:flex;align-items:center;gap:10px;padding:0 18px 20px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .brand .mark{width:26px;height:26px;border-radius:6px;background:#fff;display:grid;place-items:center;flex:0 0 auto;overflow:hidden;border:1px solid var(--line)}
  .brand .mark .logo{width:100%;height:100%;object-fit:contain;background:#fff}
  .brand .mark .mark-fallback{display:none;place-items:center;width:100%;height:100%;background:linear-gradient(160deg,var(--accent),#1E8C7E)}
  .brand .mark svg{width:15px;height:15px}
  .about{display:flex;flex-direction:column;gap:1px;margin-bottom:8px}
  .about b{font-size:11px;color:var(--text);font-weight:600;letter-spacing:.01em}
  .about span{font-size:10px;color:var(--muted)}
  .ver{color:var(--dim);font-size:10.5px;letter-spacing:.06em}
  .brand b{font-size:13px;font-weight:600;letter-spacing:.02em;display:block;line-height:1.2}
  .brand span{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
  .nav{display:flex;flex-direction:column;gap:2px;padding:6px 10px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:0;color:var(--muted);
    padding:9px 11px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .12s,color .12s}
  .nav button svg{width:16px;height:16px;flex:0 0 auto;opacity:.85}
  .nav button:hover{background:var(--panel-2);color:var(--text)}
  .nav button.on{background:var(--panel-3);color:var(--text)}
  .nav button.on svg{color:var(--accent);opacity:1}
  .nav .badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--critical);color:#fff;border-radius:20px;padding:1px 6px;font-weight:600}
  .rail-foot{margin-top:auto;padding:14px 18px 2px;border-top:1px solid var(--line);color:var(--dim);font-size:10.5px;letter-spacing:.06em}

  /* ---- main ---- */
  .main{overflow-y:auto}
  .topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:18px;padding:14px 26px;
    background:rgba(255,255,255,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .topbar h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.01em}
  .topbar .sub{color:var(--muted);font-size:11.5px;font-family:var(--mono)}
  .src{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
    color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:4px 11px}
  .src .dot{width:7px;height:7px;border-radius:50%}
  .src.live .dot{background:var(--ok);box-shadow:0 0 0 3px rgba(52,198,171,.16)}
  .src.sample .dot{background:var(--high);box-shadow:0 0 0 3px rgba(242,160,61,.16)}
  .view{padding:24px 26px 60px;max-width:1180px}

  .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .lead{color:var(--muted);font-size:12.5px;margin:4px 0 20px;max-width:70ch}

  /* readouts */
  .readouts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .readout{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
  .readout .k{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .readout .v{font-family:var(--mono);font-size:30px;font-weight:500;line-height:1.1;margin-top:8px}
  .readout .u{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:4px}
  .readout.warn .v{color:var(--high)} .readout.crit .v{color:var(--critical)}
  .readout .spark{position:absolute;right:0;bottom:0;left:0;height:3px;background:var(--line)}
  .readout .spark i{display:block;height:100%;background:var(--accent)}

  /* panels */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px}
  .panel > h3{margin:0 0 3px;font-size:14px;font-weight:600}
  .panel > .note{color:var(--muted);font-size:11.5px;margin:0 0 16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}.app{grid-template-columns:64px 1fr}.brand b,.brand span,.nav button span,.rail-foot{display:none}.nav button{justify-content:center}}

  /* annunciator */
  .annun{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:10px}
  .cell{background:var(--panel-2);border:1px solid var(--line);border-left-width:3px;border-radius:8px;padding:11px 12px;position:relative}
  .cell .led{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%}
  .cell .tag{font-family:var(--mono);font-size:11.5px;color:var(--text);font-weight:500;letter-spacing:-.01em}
  .cell .cnt{font-family:var(--mono);font-size:24px;font-weight:500;margin-top:6px;line-height:1}
  .cell .lvl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:5px;font-weight:600}
  .cell.critical{border-left-color:var(--critical)} .cell.critical .led{background:var(--critical);box-shadow:0 0 0 3px var(--critical-bg)}
  .cell.critical .cnt{color:var(--critical)}
  .cell.high{border-left-color:var(--high)} .cell.high .led{background:var(--high);box-shadow:0 0 0 3px var(--high-bg)} .cell.high .cnt{color:var(--high)}
  .cell.medium{border-left-color:var(--medium)} .cell.medium .led{background:var(--medium)} .cell.medium .cnt{color:var(--medium)}
  .cell.low{border-left-color:var(--low)} .cell.low .led{background:var(--low)}
  @media(prefers-reduced-motion:no-preference){.cell.critical .led{animation:pulse 1.8s ease-in-out infinite}}
  @keyframes pulse{50%{opacity:.35}}

  /* priority bar */
  .pbar{display:flex;height:12px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .pbar i{display:block} .pbar .c{background:var(--critical)} .pbar .h{background:var(--high)} .pbar .m{background:var(--medium)} .pbar .l{background:var(--low)}
  .plegend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
  .plegend span{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .plegend b{width:9px;height:9px;border-radius:2px;display:inline-block}

  /* chart svg */
  .axis{stroke:var(--line);stroke-width:1}
  .axis-t{fill:var(--muted);font-family:var(--mono);font-size:10px}
  .gridline{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4;opacity:.6}

  /* ranked rows (co-occurrence) */
  .rows{display:flex;flex-direction:column;gap:9px}
  .rrow{display:grid;grid-template-columns:220px 1fr 44px;align-items:center;gap:14px}
  .rrow .pair{font-family:var(--mono);font-size:11.5px;color:var(--text)}
  .rrow .pair em{color:var(--muted);font-style:normal}
  .rrow .track{height:9px;background:var(--panel-2);border-radius:5px;overflow:hidden}
  .rrow .track i{display:block;height:100%;background:linear-gradient(90deg,#2C7C74,var(--accent));border-radius:5px}
  .rrow .n{font-family:var(--mono);font-size:12px;text-align:right;color:var(--muted)}
  .rrow.key .track i{background:linear-gradient(90deg,#8a5a1e,var(--high))}
  .rrow.key .pair{color:var(--high)}

  /* sequences */
  .seq{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .seq .head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .seq .occ{font-family:var(--mono);font-size:11px;background:var(--panel-3);border:1px solid var(--line);border-radius:20px;padding:2px 10px;color:var(--muted)}
  .seq .occ b{color:var(--text)}
  .seq .tip{color:var(--muted);font-size:11px;margin-left:auto;font-family:var(--mono)}
  .chain{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
  .step{display:flex;flex-direction:column;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:7px 11px;border-top-width:2px}
  .step .st{font-family:var(--mono);font-size:11.5px}
  .step .sl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .step.CRITICAL{border-top-color:var(--critical)} .step.CRITICAL .sl{color:var(--critical)}
  .step.HIGH{border-top-color:var(--high)} .step.HIGH .sl{color:var(--high)}
  .step.MEDIUM{border-top-color:var(--medium)} .step.MEDIUM .sl{color:var(--medium)}
  .step.LOW{border-top-color:var(--low)}
  .arrow{color:var(--dim);font-family:var(--mono);font-size:13px;padding:0 2px}

  /* root cause */
  .rc{display:grid;grid-template-columns:300px 1fr;gap:18px}
  @media(max-width:820px){.rc{grid-template-columns:1fr}}
  .inc-list{display:flex;flex-direction:column;gap:8px;max-height:520px;overflow-y:auto;padding-right:4px}
  .inc{width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--line);border-left-width:3px;border-radius:9px;
    padding:12px 14px;cursor:pointer;transition:border-color .12s,background .12s}
  .inc:hover{background:var(--panel-3)}
  .inc.sel{border-color:var(--line-2);background:var(--panel-3)}
  .inc.sel{border-left-color:var(--accent)}
  .inc .id{font-family:var(--mono);font-size:12px;font-weight:500}
  .inc .cause{font-size:11.5px;color:var(--muted);margin-top:3px}
  .inc .when{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:6px}
  .inc.done{border-left-color:var(--ok)}
  .detail{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:20px}
  .detail .dl{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .detail .cause-lg{font-size:19px;font-weight:600;margin:6px 0 2px}
  .detail .conf{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .cand{margin-top:18px}
  .cand table{width:100%;border-collapse:collapse;font-size:12px}
  .cand th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 0 8px}
  .cand td{padding:8px 0;border-top:1px solid var(--line);font-family:var(--mono);font-size:11.5px}
  .cand .rk{color:var(--dim)} .cand .rk.one{color:var(--accent)}
  .lvltag{font-size:9px;letter-spacing:.08em;padding:2px 6px;border-radius:4px;font-weight:600}
  .lvltag.CRITICAL{background:var(--critical-bg);color:var(--critical)} .lvltag.HIGH{background:var(--high-bg);color:var(--high)}
  .lvltag.MEDIUM{background:var(--medium-bg);color:var(--medium)}
  .lvltag.LO,.lvltag.LOW{background:var(--low-bg);color:var(--low)}
  /* EEMUA scorecard */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
  .kpi{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
  .kpi .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .kpi .v{font-family:var(--mono);font-size:21px;margin-top:6px}
  .kpi .t{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--mono)}
  .kpi.bad .v{color:var(--critical)} .kpi.warn .v{color:var(--high)} .kpi.ok .v{color:var(--ok)}
  .tgt{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px}
  .tgt .bar{flex:1;height:6px;background:var(--panel-3);border-radius:4px;overflow:hidden;position:relative}
  .tgt .bar i{display:block;height:100%;background:var(--high)}
  .tgt .bar u{position:absolute;top:-2px;width:2px;height:10px;background:var(--ok)}
  .btn{margin-top:20px;background:var(--accent);color:#FFFFFF;border:0;border-radius:8px;padding:10px 16px;font-weight:600;font-size:12.5px;cursor:pointer}
  .btn:hover{filter:brightness(1.06)} .btn:disabled{background:var(--panel-3);color:var(--ok);cursor:default}
  .btn.done{background:none;border:1px solid var(--ok);color:var(--ok)}

  /* relationship graph */
  .graphwrap{position:relative}
  .gnode{cursor:pointer;transition:opacity .15s}
  .gnode:hover{opacity:1 !important}
  .gedge{transition:opacity .15s}
  .glabel{font-family:var(--mono);font-size:9px;fill:var(--muted);pointer-events:none}
  .gtip{position:absolute;background:var(--panel-3);border:1px solid var(--line-2);border-radius:7px;padding:8px 11px;
    font-family:var(--mono);font-size:11px;pointer-events:none;z-index:6;max-width:260px;box-shadow:0 6px 20px rgba(26,36,48,.14)}
  .gtip b{color:var(--text);word-break:break-all}
  .gtip .m{color:var(--muted);margin-top:3px}
  .glegend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--muted)}
  .glegend b{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

  /* incident timeline */
  .tl-controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .tl-controls button{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:7px;
    padding:6px 12px;font-size:11.5px;font-family:var(--mono);cursor:pointer}
  .tl-controls button.on{background:var(--panel-3);color:var(--text);border-color:var(--line-2)}
  .tlrow{display:grid;grid-template-columns:132px 1fr;gap:14px;align-items:center;padding:9px 0;border-top:1px solid var(--line)}
  .tlrow:first-child{border-top:0}
  .tlrow .yr{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .tlrow .track{position:relative;height:26px;background:var(--panel-2);border-radius:6px;overflow:hidden}
  .tlrow .track i{position:absolute;top:4px;height:18px;border-radius:3px;min-width:3px;cursor:pointer;opacity:.82;transition:opacity .12s}
  .tlrow .track i:hover{opacity:1}
  .inc-detail{background:var(--panel-2);border:1px solid var(--line-2);border-radius:10px;padding:16px 18px;margin-top:16px}
  .inc-detail .h{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
  .inc-detail .h b{font-family:var(--mono);font-size:14px}
  .inc-detail .meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .inc-detail .meta u{color:var(--text);text-decoration:none}

  /* recommendations */
  .rec{display:flex;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-left-width:3px;
    border-radius:9px;padding:13px 15px;margin-bottom:10px}
  .rec.p1{border-left-color:var(--critical)} .rec.p2{border-left-color:var(--high)} .rec.p3{border-left-color:var(--accent)}
  .rec .num{font-family:var(--mono);font-size:13px;color:var(--muted);flex:0 0 auto;width:20px}
  .rec .body{flex:1}
  .rec .act{font-size:13px;font-weight:600;color:var(--text)}
  .rec .why{font-size:11.5px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  .rec .tags{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
  .rec .chip{font-family:var(--mono);font-size:10px;background:var(--panel-3);border:1px solid var(--line);
    border-radius:5px;padding:2px 7px;color:var(--muted);word-break:break-all}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel-3);border:1px solid var(--line-2);
    border-radius:9px;padding:11px 18px;font-size:12.5px;box-shadow:0 10px 32px rgba(26,36,48,.18);z-index:30}
  .toast b{color:var(--ok)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>

/* ---------------- data loading ---------------- */
async function loadLive(){
  const g = p => fetch(p).then(r => { if(!r.ok) throw new Error(p); return r.json(); });
  const [summary,tags_status,bad_actors,chattering,floods,co_occurrence,sequences,root_cause,kpis,cause_hints,incidents,recommendations,kb_stats] =
    await Promise.all(["/api/summary","/api/tags-status","/api/bad-actors","/api/chattering",
      "/api/floods","/api/co-occurrence","/api/sequences","/api/root-cause",
      "/api/kpis","/api/cause-hints","/api/incidents","/api/recommendations","/api/kb-stats"].map(g));
  return { summary,tags_status,bad_actors,chattering,floods,co_occurrence,sequences,root_cause,kpis,cause_hints,incidents,recommendations,kb_stats };
}

/* ---------------- small view helpers ---------------- */
function Readout({k,v,u,tone,fill}){
  return (
    <div className={"readout "+(tone||"")}>
      <div className="k">{k}</div>
      <div className="v">{v}<span className="u">{u}</span></div>
      {fill!=null && <div className="spark"><i style={{width:Math.min(100,fill)+"%"}}/></div>}
    </div>
  );
}

/* ---------------- OVERVIEW ---------------- */
function Overview({data}){
  const s = data.summary, pri = s.by_priority||{};
  const k = data.kpis||{}, rate = k.rate||{}, ttc = k.time_to_clear||{};
  const total = (pri.CRITICAL||0)+(pri.HIGH||0)+(pri.MEDIUM||0)+(pri.LOW||0) || 1;
  const hi = k.high_priority_share_pct, hiTgt = k.high_priority_target_pct||5;
  const tone = v => v==null ? "" : v > 10 ? "bad" : v > 1 ? "warn" : "ok";
  return (
    <div className="view">
      <div className="eyebrow">Situation overview</div>
      <p className="lead">Abnormal-condition summary for {s.sources ? s.sources.toLocaleString()+" alarm sources" : "the line"}.
        The panel below is an annunciator: each source lights by its worst alarm priority, ordered by alarm load.</p>
      <div className="readouts">
        <Readout k="Alarms" v={s.total_alarms.toLocaleString()} />
        <Readout k="Critical" v={(pri.CRITICAL||0).toLocaleString()} tone="crit" />
        <Readout k="Incidents" v={s.incidents.toLocaleString()} />
        <Readout k="Top bad-actor share" v={s.bad_actor_share} u="%" tone="warn" fill={s.bad_actor_share}/>
        <Readout k="Flood windows" v={s.flood_windows.toLocaleString()} tone="warn" />
      </div>

      {k.rate && (
      <div className="panel">
        <h3>EEMUA-191 scorecard</h3>
        <p className="note">The four numbers an alarm engineer is judged on. Targets are EEMUA-191 / ISA-18.2, not house style.</p>
        <div className="kpis">
          <div className={"kpi "+tone(rate.avg_per_window)}>
            <div className="k">Avg alarms / 10 min</div>
            <div className="v">{rate.avg_per_window}</div>
            <div className="t">target ≤ 1 · {rate.eemua_verdict}</div>
          </div>
          <div className={"kpi "+(rate.peak_per_window>10?"bad":"ok")}>
            <div className="k">Peak / 10 min</div>
            <div className="v">{(rate.peak_per_window||0).toLocaleString()}</div>
            <div className="t">manageable peak ≤ 10</div>
          </div>
          <div className={"kpi "+(hi>hiTgt?"bad":"ok")}>
            <div className="k">High + critical share</div>
            <div className="v">{hi}%</div>
            <div className="t">rationalisation target ≈ {hiTgt}%</div>
          </div>
          <div className={"kpi "+(k.standing_alarm_count>0?"warn":"ok")}>
            <div className="k">Standing alarms</div>
            <div className="v">{(k.standing_alarm_count||0).toLocaleString()}</div>
            <div className="t">raised, never cleared</div>
          </div>
          {ttc.median_min!=null && (
          <div className={"kpi "+(ttc.median_min>60?"warn":"ok")}>
            <div className="k">Median time to clear</div>
            <div className="v">{Math.round(ttc.median_min).toLocaleString()}<span style={{fontSize:12,color:"var(--muted)"}}> min</span></div>
            <div className="t">{ttc.over_24h_pct}% still active after 24 h</div>
          </div>)}
        </div>
      </div>)}

      <div className="panel">
        <h3>Alarm priority distribution</h3>
        <p className="note">A rationalised system is dominated by low-priority alarms; the marker is the ISA-18.2 target for high+critical.</p>
        <div className="pbar">
          <i className="c" style={{width:(100*(pri.CRITICAL||0)/total)+"%"}}/>
          <i className="h" style={{width:(100*(pri.HIGH||0)/total)+"%"}}/>
          <i className="m" style={{width:(100*(pri.MEDIUM||0)/total)+"%"}}/>
          <i className="l" style={{width:(100*(pri.LOW||0)/total)+"%"}}/>
        </div>
        <div className="plegend">
          <span><b style={{background:"var(--critical)"}}/>Critical · {(pri.CRITICAL||0).toLocaleString()}</span>
          <span><b style={{background:"var(--high)"}}/>High · {(pri.HIGH||0).toLocaleString()}</span>
          <span><b style={{background:"var(--medium)"}}/>Medium · {(pri.MEDIUM||0).toLocaleString()}</span>
          <span><b style={{background:"var(--low)"}}/>Low · {(pri.LOW||0).toLocaleString()}</span>
        </div>
        {hi!=null && (
          <div className="tgt">
            <span>high+critical {hi}%</span>
            <span className="bar"><i style={{width:Math.min(100,hi)+"%"}}/><u style={{left:hiTgt+"%"}}/></span>
            <span>target {hiTgt}%</span>
          </div>)}
      </div>

      <div className="panel">
        <h3>Annunciator panel</h3>
        <p className="note">{data.tags_status.length} instruments monitored · sorted by alarm count</p>
        <div className="annun">
          {data.tags_status.map(t=>(
            <div key={t.tag} className={"cell "+t.worst_priority.toLowerCase()}>
              <span className="led"/>
              <div className="tag">{t.tag}</div>
              <div className="cnt">{t.alarm_count}</div>
              <div className="lvl">{t.worst_priority}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- BAD ACTORS (Pareto) ---------------- */
function Pareto({data}){
  const rows = data.bad_actors;
  const W=760,H=320,mL=44,mR=44,mT=16,mB=72;
  const iw=W-mL-mR, ih=H-mT-mB;
  const maxCount = Math.max(...rows.map(r=>r.alarm_count));
  const bw = iw/rows.length;
  const x = i => mL + i*bw;
  const yC = c => mT + ih - (c/maxCount)*ih;
  const yP = p => mT + ih - (p/100)*ih;
  const cumPts = rows.map((r,i)=>[x(i)+bw/2, yP(r.cum_pct)]);
  return (
    <div className="view">
      <div className="eyebrow">Bad actors · ISA-18.2</div>
      <p className="lead">Which instruments generate the alarm load. Typically a handful of "bad actors" produce

    <div className="view">

      <p className="lead">Two classic failure modes: chattering instruments that re-alarm many times a minute,

      <div className="panel">
        <h3>Chattering instruments</h3>
        <p className="note">Same alarm re-activating ≥3× within 60 s — prime candidates for a deadband or filter fix</p>
        {data.chattering.length===0 ? <p className="note">None detected.</p> :
          <div className="rows">
            {data.chattering.map(c=>(
              <div key={c.tag+c.level} className="rrow key">
                <div className="pair">{c.tag} <em>· {c.level}</em></div>
                <div className="track"><i style={{width:"100%"}}/></div>
                <div className="n">{c.chattering_events}</div>

            ))}

      <div className="panel">
        <h3>Alarm floods over time</h3>
        <p className="note">Each bar is a 10-minute window exceeding 10 alarms · height ∝ count · color ∝ priority</p>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" role="img" aria-label="Alarm flood timeline">
          <line className="axis" x1={mL} x2={W-mR} y1={mT+ih} y2={mT+ih}/>

            return <rect key={i} x={xt(times[i])-3} y={mT+ih-h} width="6" height={h} rx="1.5"

/* ---------------- CORRELATIONS (relationship graph) ---------------- */
/* Short label for a long asset id: last two dash-segments carry the equipment
   (…-FCU-0458), which is what an engineer recognises — the campus prefix doesn't. */
function shortTag(t){
  const p = String(t).split("-");
  return p.length>2 ? p.slice(-2).join("-") : t;
}
/* Fruchterman-Reingold layout — deterministic (seeded by node order) so the graph
   doesn't reshuffle on every render. Pure function, memoised by the caller. */
function forceLayout(nodes, links, W, H, iters=430){
  const pos={}; nodes.forEach((n,i)=>{ const a=2*Math.PI*i/nodes.length;
    pos[n]={x:W/2+Math.cos(a)*100, y:H/2+Math.sin(a)*100}; });
  const k=Math.sqrt(W*H/Math.max(nodes.length,1))*0.55;
  for(let it=0; it<iters; it++){
    const temp=(W/10)*Math.pow(1-it/iters,1.5)+0.5;
    const disp={}; nodes.forEach(n=>disp[n]={x:0,y:0});
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const a=pos[nodes[i]],b=pos[nodes[j]];
      let dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||0.01;
      const rep=k*k/d; disp[nodes[i]].x+=dx/d*rep; disp[nodes[i]].y+=dy/d*rep;
      disp[nodes[j]].x-=dx/d*rep; disp[nodes[j]].y-=dy/d*rep;
    }
    for(const l of links){ const a=pos[l.a],b=pos[l.b];
      let dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||0.01;
      const att=d*d/k*(0.4+l.w*0.1); disp[l.a].x-=dx/d*att; disp[l.a].y-=dy/d*att;
      disp[l.b].x+=dx/d*att; disp[l.b].y+=dy/d*att; }
    for(const n of nodes){ const p=pos[n];
      p.x+=(W/2-p.x)*0.02; p.y+=(H/2-p.y)*0.02;
      const dd=Math.hypot(disp[n].x,disp[n].y)||0.01;
      p.x+=disp[n].x/dd*Math.min(dd,temp); p.y+=disp[n].y/dd*Math.min(dd,temp);
      p.x=Math.max(30,Math.min(W-30,p.x)); p.y=Math.max(26,Math.min(H-26,p.y)); }
  }
  return pos;
}

function Correlations({data}){
  const rows = data.co_occurrence;
  const W=760,H=440;
  const [hover,setHover]=useState(null);

  const {nodes,links,pos,deg,maxW,maxDeg} = useMemo(()=>{
    const deg={}, nodeset=new Set();
    const links = rows.map(r=>{
      nodeset.add(r.tag_a); nodeset.add(r.tag_b);
      deg[r.tag_a]=(deg[r.tag_a]||0)+r.co_occurrences;
      deg[r.tag_b]=(deg[r.tag_b]||0)+r.co_occurrences;
      return {a:r.tag_a,b:r.tag_b,w:r.co_occurrences};
    });
    const nodes=[...nodeset];
    const maxW=Math.max(...links.map(l=>l.w),1);
    links.forEach(l=>l.w=l.w/maxW*5);   // normalise weight to 0..5 for the layout
    const pos=forceLayout(nodes,links,W,H);
    return {nodes,links,pos,deg,maxW,maxDeg:Math.max(...Object.values(deg),1)};
  },[rows]);

  const zoneColor = t => {
    const z=String(t).split("-")[1]||"";
    let h=0; for(const c of z) h=(h*31+c.charCodeAt(0))%360;
    return `hsl(${h},52%,58%)`;
  };
  const nodeR = t => 6+Math.sqrt(deg[t]/maxDeg)*16;
  const hovNeighbors = hover ? new Set(links.filter(l=>l.a===hover||l.b===hover)
    .flatMap(l=>[l.a,l.b])) : null;

  return (
    <div className="view">
      <div className="eyebrow">Alarm relationship graph</div>
      <p className="lead">Sources whose alarms repeatedly fire together within 15 minutes, drawn as a network.
        Node size is total co-occurrence load; edge thickness is how often that pair fires together; colour groups
        by building block. Tight clusters are equipment that fails as a unit — candidate cause-and-effect groups
        for the knowledge graph. Hover a node to isolate its neighbourhood.</p>
      <div className="panel">
        <h3>Co-occurrence network · top {rows.length} pairs</h3>
        <p className="note">Strongest single link: {maxW.toLocaleString()} co-occurrences</p>
        <div className="graphwrap">
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" role="img" aria-label="Alarm co-occurrence network graph">
            {links.map((l,i)=>{
              const dim = hover && !(l.a===hover||l.b===hover);
              return <line key={i} className="gedge" x1={pos[l.a].x} y1={pos[l.a].y}
                x2={pos[l.b].x} y2={pos[l.b].y} stroke="var(--line-2)"
                strokeWidth={0.5+l.w*0.7} opacity={dim?0.06:0.30+l.w*0.06}/>;
            })}
            {nodes.map(n=>{
              const dim = hover && !hovNeighbors.has(n);
              const r=nodeR(n);
              return (
                <g key={n} className="gnode" opacity={dim?0.22:1}
                   onMouseEnter={()=>setHover(n)} onMouseLeave={()=>setHover(null)}>
                  <circle cx={pos[n].x} cy={pos[n].y} r={r} fill={zoneColor(n)}
                    stroke="var(--bg)" strokeWidth="1.5"/>
                  {(r>11||n===hover) &&
                    <text className="glabel" x={pos[n].x} y={pos[n].y+r+9} textAnchor="middle">{shortTag(n)}</text>}
                </g>
              );
            })}
          </svg>
          {hover && (
            <div className="gtip" style={{left:Math.min(pos[hover].x/W*100,68)+"%",
                 top:Math.max(pos[hover].y/H*100-6,2)+"%"}}>
              <b>{hover}</b>
              <div className="m">total co-occurrence: {Math.round(deg[hover]).toLocaleString()}</div>
              <div className="m">links: {links.filter(l=>l.a===hover||l.b===hover).length}</div>
            </div>
          )}
        </div>
        <div className="glegend">
          <span>Node size ∝ co-occurrence load · edge width ∝ pair strength · colour = building block</span>
        </div>
      </div>
    </div>
  );
}

/* ---------------- ROOT CAUSE ---------------- */
function RootCause({data,onToast}){
  const incidents = useMemo(()=>{
    const by={};
    data.root_cause.forEach(r=>{ (by[r.incident_id]=by[r.incident_id]||[]).push(r); });
    return Object.entries(by).map(([id,rows])=>{
      rows.sort((a,b)=>(+a.rank)-(+b.rank));
      const top=rows[0];
      const hints = data.cause_hints||{};
      return { id, rows, top, cause:top.hint||hints[top.tag]||("Investigate "+top.tag), when:top.first_ts };
    });
  },[data]);
  const [sel,setSel]=useState(incidents[0]?.id);
  const [done,setDone]=useState({});
  const cur = incidents.find(i=>i.id===sel)||incidents[0];

  return (
    <div className="view">
      <div className="eyebrow">Root-cause analysis</div>
      <p className="lead">For each incident the platform ranks probable contributing instruments — earliest-firing
        first, because causes precede effects. Confirming a diagnosis writes it to the knowledge base so future
        matches are recognized automatically.</p>
      <div className="rc">
        <div className="inc-list">
          {incidents.map(inc=>(
            <button key={inc.id} className={"inc"+(inc.id===sel?" sel":"")+(done[inc.id]?" done":"")}
              onClick={()=>setSel(inc.id)}>
              <div className="id">{inc.id}{done[inc.id] && " ✓"}</div>
              <div className="cause">{inc.cause}</div>
              <div className="when">{inc.when}</div>
            </button>
          ))}
        </div>
        {cur && (
          <div className="detail">
            <div className="dl">Probable root cause · {cur.id}</div>
            <div className="cause-lg">{cur.cause}</div>
            <div className="conf">Primary indicator: {cur.top.tag} · {cur.top.level}
              {cur.top.confidence!=null && <> · confidence {(+cur.top.confidence).toFixed(2)}</>}</div>
            {cur.top.explanation && <div className="conf" style={{marginTop:6,color:"var(--muted)"}}>Why: {cur.top.explanation}</div>}
            <div className="cand">
              <table>
                <thead><tr><th>Rank</th><th>Source</th><th>Alarm</th><th>Conf.</th><th>First seen</th></tr></thead>
                <tbody>
                  {cur.rows.slice(0,6).map(r=>(
                    <tr key={r.rank+r.tag}>
                      <td className={"rk"+(+r.rank===1?" one":"")}>#{r.rank}</td>
                      <td>{r.tag}</td>
                      <td><span className={"lvltag "+(r.priority||PRI_OF_LEVEL[r.level]||"LOW")}>{r.level}</span></td>
                      <td className="rk">{r.confidence!=null ? (+r.confidence).toFixed(2) : "—"}</td>
                      <td className="rk">{(r.first_ts||"").slice(0,19)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <button className={"btn"+(done[cur.id]?" done":"")} disabled={!!done[cur.id]}
              onClick={()=>{
                fetch("/api/confirm",{method:"POST",headers:{"Content-Type":"application/json"},
                  body:JSON.stringify({incident_id:cur.id, confirmed_cause:cur.cause,
                    action_taken:cur.cause, operator:"Y. Mallass"})})
                  .then(()=>{ setDone({...done,[cur.id]:true}); onToast(cur.id); })
                  .catch(()=>{ setDone({...done,[cur.id]:true}); onToast(cur.id); });
              }}>
              {done[cur.id] ? "✓ Saved to knowledge base" : "Confirm root cause"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- INCIDENT TIMELINE ---------------- */
const PRI_COLOR = {CRITICAL:"var(--critical)",HIGH:"var(--high)",MEDIUM:"var(--medium)",LOW:"var(--low)"};

function IncidentTimeline({data}){
  const incs = data.incidents||[];
  const [pri,setPri]=useState("ALL");
  const [sel,setSel]=useState(null);

  const filtered = useMemo(()=>{
    const f = pri==="ALL" ? incs : incs.filter(i=>i.top_priority===pri);
    return f.map(i=>({...i, _t:new Date(String(i.start_ts).replace(" ","T")).getTime()}))
            .filter(i=>!isNaN(i._t));
  },[incs,pri]);

  const byYear = useMemo(()=>{
    const g={};
    filtered.forEach(i=>{ const y=new Date(i._t).getFullYear(); (g[y]=g[y]||[]).push(i); });
    return Object.entries(g).sort((a,b)=>a[0]-b[0]);
  },[filtered]);

  const maxCount = Math.max(...incs.map(i=>i.alarm_count),1);
  const cur = sel && filtered.find(i=>i.incident_id===sel);
  const rc = cur ? (data.root_cause||[]).filter(r=>r.incident_id===cur.incident_id)
                    .sort((a,b)=>a.rank-b.rank) : [];

  if(!incs.length) return (
    <div className="view"><div className="eyebrow">Incident timeline</div>
      <p className="lead">No segmented incidents in the current dataset.</p></div>);

  return (
    <div className="view">
      <div className="eyebrow">Incident timeline</div>
      <p className="lead">Every incident the platform segmented from the alarm stream, laid out in time. Each bar is
        one incident, positioned within its year, width scaled to how long it ran and height to how many alarms it
        fired. Colour is the worst priority reached. Click any incident to see its root-cause ranking.</p>

      <div className="tl-controls">
        {["ALL","CRITICAL","HIGH","MEDIUM","LOW"].map(p=>(
          <button key={p} className={pri===p?"on":""} onClick={()=>{setPri(p);setSel(null);}}>
            {p==="ALL"?`All (${incs.length})`:p}
          </button>
        ))}
      </div>

      <div className="panel">
        <h3>Incidents by year</h3>
        <p className="note">Bar position ∝ time within the year · height ∝ alarm count · colour = worst priority</p>
        {byYear.map(([yr,list])=>{
          const y0=new Date(`${yr}-01-01`).getTime(), y1=new Date(`${+yr+1}-01-01`).getTime();
          return (
            <div key={yr} className="tlrow">
              <div className="yr">{yr} · {list.length} incident{list.length>1?"s":""}</div>
              <div className="track">
                {list.map(i=>{
                  const left=((i._t-y0)/(y1-y0))*100;
                  const h=6+Math.sqrt(i.alarm_count/maxCount)*18;
                  const w=Math.max(3,Math.min(6,(i.duration_min||10)/120));
                  return <i key={i.incident_id} title={`${i.incident_id} · ${i.alarm_count} alarms`}
                    onClick={()=>setSel(i.incident_id)}
                    style={{left:`calc(${Math.min(left,99)}% - ${w/2}px)`, width:w+"px",
                      height:h+"px", top:(26-h)/2+"px", background:PRI_COLOR[i.top_priority],
                      outline:sel===i.incident_id?"2px solid var(--text)":"none"}}/>;
                })}
              </div>
            </div>
          );
        })}
      </div>

      {cur && (
        <div className="inc-detail">
          <div className="h">
            <b>{cur.incident_id}</b>
            <span className="lvltag" style={{background:"var(--panel-3)",
              color:PRI_COLOR[cur.top_priority]}}>{cur.top_priority}</span>
          </div>
          <div className="meta">
            <span>started <u>{String(cur.start_ts).slice(0,16)}</u></span>
            <span>ran <u>{cur.duration_min!=null?Math.round(cur.duration_min)+" min":"—"}</u></span>
            <span><u>{cur.alarm_count.toLocaleString()}</u> alarms</span>
            <span><u>{cur.tags}</u> sources</span>
            {cur.zone && <span>console <u>{cur.zone}</u></span>}
          </div>
          {rc.length>0 && (
            <div className="cand" style={{marginTop:14}}>
              <table>
                <thead><tr><th>Rank</th><th>Probable cause</th><th>Alarm</th><th>Conf.</th></tr></thead>
                <tbody>
                  {rc.slice(0,4).map(r=>(
                    <tr key={r.rank}>
                      <td className={"rk"+(r.rank===1?" one":"")}>#{r.rank}</td>
                      <td>{shortTag(r.tag)}<div style={{color:"var(--dim)",fontSize:10}}>{r.hint}</div></td>
                      <td><span className={"lvltag "+(r.priority||"LOW")}>{r.level}</span></td>
                      <td className="rk">{(+r.confidence).toFixed(2)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                    {(rec.tags||[]).slice(0,3).map(t=><span key={t} className="chip">{t}</span>)}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- APP ---------------- */
const VIEWS = [
  ["overview","Overview",Overview],
  ["bad","Bad actors",Pareto],
  ["nuisance","Nuisance alarms",Nuisance],
  ["timeline","Incident timeline",IncidentTimeline],
  ["corr","Relationship graph",Correlations],
  ["seq","Sequences",Sequences],
  ["rc","Root cause",RootCause],
  ["reco","Recommendations",Recommendations],
];

function App(){
  const [data,setData]=useState(null);
  const [source,setSource]=useState("...");
  const [tab,setTab]=useState("overview");
  const [toast,setToast]=useState(null);

  useEffect(()=>{
    let ok=true;
    loadLive().then(d=>{ if(ok){ setData(d); setSource("live"); }})
      .catch(()=>{ if(ok){ setData(window.EMBEDDED); setSource("sample"); }});
    return ()=>{ ok=false; };
  },[]);

  function fireToast(id){ setToast(id); setTimeout(()=>setToast(null),2600); }

  if(!data) return <div style={{display:"grid",placeItems:"center",height:"100vh",color:"var(--muted)",fontFamily:"var(--mono)"}}>Loading…</div>;

  const View = VIEWS.find(v=>v[0]===tab)[2];
  const crit = data.summary.by_priority?.CRITICAL||0;

  return (
    <div className="app">
      <aside className="rail">
        <div className="brand">
          <div className="mark">
            <img src="ocp_logo.png" alt="OCP" className="logo"
                 onError={e=>{ e.target.style.display="none";
                               e.target.parentNode.querySelector(".mark-fallback").style.display="grid"; }}/>
            <span className="mark-fallback">{ICONS.spark}</span>
          </div>
          <div><b>Alarm Intelligence</b><span>OCP</span></div>
        </div>
        <nav className="nav">
          {VIEWS.map(([id,label])=>(
            <button key={id} className={tab===id?"on":""} onClick={()=>setTab(id)}>
              {ICONS[id]}<span>{label}</span>
              {id==="overview" && crit>0 && <span className="badge">{crit}</span>}
            </button>
          ))}
        </nav>
        <div className="rail-foot">
          <div className="about">
            <b>MAP Soluble Department</b>
            <span>Built by Yassine Mallass</span>
          </div>
          <div className="ver">{data.summary.kind==="real" ? "IBMS alarm log" : "synthetic demo"} · v0.2</div>
        </div>
      </aside>

      <main className="main">
        <header className="topbar">
          <h1>{data.summary.dataset || "Alarm system"}</h1>
          <span className="sub">{data.summary.sources?.toLocaleString()} sources · {data.summary.range?.[0]?.slice(0,10)} → {data.summary.range?.[1]?.slice(0,10)}</span>
          <div className={"src "+source}>
            <span className="dot"/>{source==="live"?"LIVE API":"SAMPLE DATA"}
          </div>
        </header>
        <View data={data} onToast={fireToast}/>
      </main>

      {toast && <div className="toast"><b>{toast}</b> confirmed and saved to the knowledge base</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
